<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Kennion · Prediction Engine</title>
    <meta name="viewport" content="width=1440" />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=JetBrains+Mono:wght@400;500&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      // Surface any uncaught error directly on the page instead of leaving a
      // blank white screen. Prevents the "is it deploying or is it broken?"
      // confusion when something throws during initial render.
      (function () {
        function showError(label, msg, stack) {
          var root = document.getElementById('root') || document.body;
          root.innerHTML = '<div style="font:14px/1.5 ui-monospace,monospace;padding:32px;max-width:900px;margin:40px auto;background:#fff5f5;border:1px solid #c44;border-radius:6px;color:#222"><div style="font-weight:700;font-size:16px;color:#a33;margin-bottom:8px">Prediction Engine — runtime error</div><div style="margin-bottom:8px">' + label + ':</div><div style="background:#fff;padding:12px;border-radius:4px;border:1px solid #eed;white-space:pre-wrap;word-break:break-word;font-size:12.5px">' + (msg || '(no message)') + (stack ? '\n\n' + stack : '') + '</div><div style="margin-top:12px;color:#666;font-size:12px">Hard-refresh (Ctrl+Shift+R) once. If it persists, paste this to the engineer.</div></div>';
        }
        window.addEventListener('error', function (e) {
          showError('Window error', e.message, e.error && e.error.stack);
        });
        window.addEventListener('unhandledrejection', function (e) {
          var r = e.reason || {};
          showError('Unhandled promise', r.message || String(r), r.stack);
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
